; EAS Voice Controller — PlatformIO Configuration
; =================================================
; Open this folder in VS Code with PlatformIO extension installed,
; or use the Arduino IDE with the settings below.

[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino
; Serial monitor baud rate
monitor_speed = 921600

; Use UART bridge serial (COMx) for host communication.
; This keeps flashing and runtime serial on the same port.
build_flags =
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DCORE_DEBUG_LEVEL=1

; Required libraries
lib_deps =
  adafruit/Adafruit NeoPixel @ ^1.12.0

; Upload via UART (use the port labelled UART on the DevKitC-1)
upload_protocol = esptool
upload_port = COM6
monitor_port = COM6
