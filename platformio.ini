; EAS Voice Controller — PlatformIO Configuration
; =================================================
; Open this folder in VS Code with PlatformIO extension installed,
; or use the Arduino IDE with the settings below.

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino
; Serial monitor baud rate
monitor_speed = 921600

build_flags =
  -DCORE_DEBUG_LEVEL=1

; Required libraries
lib_deps =
  adafruit/Adafruit NeoPixel @ ^1.12.0

; Upload via UART/USB serial on the AZ-Delivery ESP32 board
upload_protocol = esptool
upload_port = COM3
monitor_port = COM3
